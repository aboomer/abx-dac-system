<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABX DAC System</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white h-screen w-screen overflow-hidden font-sans">

<!-- STATE 1: SETUP -->
<div id="state-setup" class="h-full w-full flex flex-col p-8">
  <h1 class="text-4xl font-bold mb-6">ABX DAC System</h1>

  <div class="flex-1 overflow-y-auto mb-6 bg-slate-800 rounded-2xl p-4">
    <div class="text-2xl mb-3 text-slate-300">Select a track</div>
    <div id="track-list" class="space-y-2"></div>
  </div>

  <div class="flex items-end justify-between gap-8">
    <button id="add-current-track-btn" onclick="addCurrentTrack()"
      class="text-2xl px-6 py-4 rounded-2xl bg-slate-700 active:bg-slate-600 transition-colors">
      + Add Current Track
    </button>

    <div class="flex flex-col items-center gap-2 bg-slate-800 rounded-2xl px-6 py-4">
      <div class="flex items-center gap-3">
        <span class="text-2xl text-slate-300 mr-2">Trials</span>
        <div id="trial-picker" class="flex gap-2"></div>
      </div>
      <div id="trial-estimate" class="text-lg text-slate-500"></div>
    </div>

    <button id="start-session-btn" onclick="startSession()" disabled
      class="text-3xl font-bold px-10 py-5 rounded-2xl bg-slate-700 text-slate-500 cursor-not-allowed transition-colors">
      Start Session
    </button>
  </div>
</div>

<!-- STATE 2: ACTIVE SESSION -->
<div id="state-session" class="hidden h-full w-full flex flex-col items-center justify-center gap-10">
  <div class="text-2xl text-slate-400">Session Seed</div>
  <div id="session-seed" class="text-6xl font-mono font-bold">----</div>

  <div id="trial-counter" class="text-6xl font-bold">Trial 1 of 10</div>

  <div id="playback-status" class="text-4xl font-semibold px-8 py-4 rounded-2xl bg-slate-700">
    Waiting
  </div>
</div>

<!-- STATE 3: SESSION COMPLETE -->
<div id="state-complete" class="hidden h-full w-full flex flex-col items-center justify-center gap-8 p-8">
  <div class="text-4xl font-bold text-emerald-400">Session Complete</div>

  <div class="text-2xl text-slate-400">Session Seed</div>
  <div id="complete-seed" class="text-6xl font-mono font-bold">----</div>

  <div id="complete-trials" class="text-3xl text-slate-300">10 trials completed</div>

  <div class="text-xl text-slate-400 text-center max-w-xl">
    Record this seed. It can be used to reconstruct the A/B sequence for this session.
  </div>

  <button onclick="newSession()"
    class="text-3xl font-bold px-10 py-5 rounded-2xl bg-emerald-600 active:bg-emerald-500 mt-4">
    New Session
  </button>
</div>

<script>
const TRIAL_OPTIONS = [5, 10, 15, 20];
const MOCK_TRIAL_DURATION_SECONDS = 30; // matches session_config.json default in Phase 5

let tracks = [];
let selectedTrackId = null;
let trialCount = null;
let currentTrial = 1;
let sessionSeed = null;
let sessionTimer = null;

function formatDuration(seconds) {
  if (!seconds) return "--:--";
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}

async function loadTracks() {
  const res = await fetch("/api/tracks");
  tracks = await res.json();
  renderTrackList();
}

async function addCurrentTrack() {
  const res = await fetch("/api/tracks/add-current", { method: "POST" });
  const result = await res.json();
  if (result.error) {
    alert(result.error);
    return;
  }
  await loadTracks();
}

function renderTrackList() {
  const el = document.getElementById("track-list");
  if (tracks.length === 0) {
    el.innerHTML = `<div class="text-xl text-slate-500 px-2 py-8 text-center">
      No tracks yet — play something on Volumio, then tap "+ Add Current Track"
    </div>`;
    return;
  }
  el.innerHTML = tracks.map(t => `
    <button class="w-full text-left px-5 py-4 rounded-xl transition-colors border-2 ${
      t.id === selectedTrackId
        ? "bg-emerald-900 border-emerald-500"
        : "bg-slate-700 border-transparent active:bg-slate-600"
    }"
      onclick="selectTrack('${t.id}')">
      <div class="flex items-center gap-4">
        ${t.album_art_url
          ? `<img src="${t.album_art_url}" class="w-16 h-16 rounded-lg object-cover flex-shrink-0" loading="lazy">`
          : `<div class="w-16 h-16 rounded-lg bg-slate-600 flex-shrink-0"></div>`
        }
        <div class="flex-1 flex items-center justify-between min-w-0">
          <div class="min-w-0">
            <div class="text-2xl font-semibold truncate">${t.title}</div>
            <div class="text-lg text-slate-400 truncate">${t.artist} · from ${formatDuration(t.seek_seconds)}</div>
          </div>
          <div class="text-xl text-slate-400 font-mono flex-shrink-0 ml-4">${formatDuration(t.duration_seconds)}</div>
        </div>
      </div>
    </button>
  `).join("");
}

function selectTrack(id) {
  selectedTrackId = id;
  renderTrackList();
  updateStartButton();
}

function renderTrialPicker() {
  const el = document.getElementById("trial-picker");
  el.innerHTML = TRIAL_OPTIONS.map(n => `
    <button onclick="setTrials(${n})"
      class="text-2xl font-bold w-16 h-16 rounded-xl transition-colors ${
        n === trialCount ? "bg-emerald-600" : "bg-slate-700 active:bg-slate-600"
      }">
      ${n}
    </button>
  `).join("");
  const estimateEl = document.getElementById("trial-estimate");
  estimateEl.textContent = trialCount
    ? `~${Math.round(trialCount * MOCK_TRIAL_DURATION_SECONDS / 60)} min`
    : "";
}

function setTrials(n) {
  trialCount = n;
  renderTrialPicker();
}

function updateStartButton() {
  const btn = document.getElementById("start-session-btn");
  const ready = selectedTrackId !== null && trialCount !== null;
  btn.disabled = !ready;
  btn.classList.toggle("bg-emerald-600", ready);
  btn.classList.toggle("active:bg-emerald-500", ready);
  btn.classList.toggle("bg-slate-700", !ready);
  btn.classList.toggle("text-slate-500", !ready);
  btn.classList.toggle("cursor-not-allowed", !ready);
}

function showState(name) {
  ["setup", "session", "complete"].forEach(s => {
    document.getElementById(`state-${s}`).classList.toggle("hidden", s !== name);
  });
}

function startSession() {
  sessionSeed = Math.floor(1000 + Math.random() * 9000);
  currentTrial = 1;
  document.getElementById("session-seed").textContent = sessionSeed;
  document.getElementById("trial-counter").textContent = `Trial ${currentTrial} of ${trialCount}`;
  document.getElementById("playback-status").textContent = "Playing";
  showState("session");

  // Mock trial advance on a timer — replaced by real next-trial API in Phase 5
  clearInterval(sessionTimer);
  sessionTimer = setInterval(() => {
    currentTrial++;
    if (currentTrial > trialCount) {
      clearInterval(sessionTimer);
      completeSession();
      return;
    }
    document.getElementById("trial-counter").textContent = `Trial ${currentTrial} of ${trialCount}`;
  }, 4000);
}

function completeSession() {
  document.getElementById("complete-seed").textContent = sessionSeed;
  document.getElementById("complete-trials").textContent = `${trialCount} trials completed`;
  showState("complete");
}

function newSession() {
  showState("setup");
}

// --- WebSocket connection for real-time state push ---
function connectWS() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    console.log("ws message", msg);
    if (msg.event === "tracks_updated") {
      tracks = msg.tracks;
      renderTrackList();
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

loadTracks();
renderTrialPicker();
connectWS();
</script>
</body>
</html>
