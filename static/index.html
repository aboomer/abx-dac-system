<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABX DAC System</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white h-screen w-screen overflow-hidden font-sans">

<!-- STATE 1: SETUP -->
<div id="state-setup" class="h-full w-full flex flex-col p-8">
  <h1 class="text-4xl font-bold mb-6">ABX DAC System</h1>

  <div class="flex-1 overflow-y-auto mb-6 bg-slate-800 rounded-2xl p-4">
    <div class="text-2xl mb-3 text-slate-300">Select a track</div>
    <div id="track-list" class="space-y-2"></div>
  </div>

  <div class="flex items-center justify-between gap-8">
    <button id="add-current-track-btn" disabled
      class="text-2xl px-6 py-4 rounded-2xl bg-slate-700 text-slate-500 cursor-not-allowed">
      + Add Current Track
    </button>

    <div class="flex items-center gap-4 bg-slate-800 rounded-2xl px-6 py-4">
      <span class="text-2xl text-slate-300">Trials</span>
      <button onclick="changeTrials(-5)" class="text-3xl w-14 h-14 rounded-xl bg-slate-700 active:bg-slate-600">-</button>
      <span id="trial-count" class="text-4xl font-bold w-16 text-center">10</span>
      <button onclick="changeTrials(5)" class="text-3xl w-14 h-14 rounded-xl bg-slate-700 active:bg-slate-600">+</button>
    </div>

    <button onclick="startSession()"
      class="text-3xl font-bold px-10 py-5 rounded-2xl bg-emerald-600 active:bg-emerald-500">
      Start Session
    </button>
  </div>
</div>

<!-- STATE 2: ACTIVE SESSION -->
<div id="state-session" class="hidden h-full w-full flex flex-col items-center justify-center gap-10">
  <div class="text-2xl text-slate-400">Session Seed</div>
  <div id="session-seed" class="text-6xl font-mono font-bold">----</div>

  <div id="trial-counter" class="text-6xl font-bold">Trial 1 of 10</div>

  <div id="playback-status" class="text-4xl font-semibold px-8 py-4 rounded-2xl bg-slate-700">
    Waiting
  </div>
</div>

<!-- STATE 3: SESSION COMPLETE -->
<div id="state-complete" class="hidden h-full w-full flex flex-col items-center justify-center gap-8 p-8">
  <div class="text-4xl font-bold text-emerald-400">Session Complete</div>

  <div class="text-2xl text-slate-400">Session Seed</div>
  <div id="complete-seed" class="text-6xl font-mono font-bold">----</div>

  <div id="complete-trials" class="text-3xl text-slate-300">10 trials completed</div>

  <div class="text-xl text-slate-400 text-center max-w-xl">
    Record this seed. It can be used to reconstruct the A/B sequence for this session.
  </div>

  <button onclick="newSession()"
    class="text-3xl font-bold px-10 py-5 rounded-2xl bg-emerald-600 active:bg-emerald-500 mt-4">
    New Session
  </button>
</div>

<script>
// --- Mock data (replaced with real Roon data in Phase 3) ---
const mockTracks = [
  { id: "mock-1", title: "Track One — Artist A" },
  { id: "mock-2", title: "Track Two — Artist B" },
  { id: "mock-3", title: "Track Three — Artist C" },
];

let trialCount = 10;
let currentTrial = 1;
let sessionSeed = null;
let sessionTimer = null;

function renderTrackList() {
  const el = document.getElementById("track-list");
  el.innerHTML = mockTracks.map(t => `
    <button class="w-full text-left text-2xl px-5 py-4 rounded-xl bg-slate-700 active:bg-emerald-700 transition-colors"
      onclick="selectTrack('${t.id}')">
      ${t.title}
    </button>
  `).join("");
}

function selectTrack(id) {
  console.log("selected track", id);
}

function changeTrials(delta) {
  trialCount = Math.max(5, Math.min(20, trialCount + delta));
  document.getElementById("trial-count").textContent = trialCount;
}

function showState(name) {
  ["setup", "session", "complete"].forEach(s => {
    document.getElementById(`state-${s}`).classList.toggle("hidden", s !== name);
  });
}

function startSession() {
  sessionSeed = Math.floor(1000 + Math.random() * 9000);
  currentTrial = 1;
  document.getElementById("session-seed").textContent = sessionSeed;
  document.getElementById("trial-counter").textContent = `Trial ${currentTrial} of ${trialCount}`;
  document.getElementById("playback-status").textContent = "Playing";
  showState("session");

  // Mock trial advance on a timer — replaced by real next-trial API in Phase 5
  clearInterval(sessionTimer);
  sessionTimer = setInterval(() => {
    currentTrial++;
    if (currentTrial > trialCount) {
      clearInterval(sessionTimer);
      completeSession();
      return;
    }
    document.getElementById("trial-counter").textContent = `Trial ${currentTrial} of ${trialCount}`;
  }, 4000);
}

function completeSession() {
  document.getElementById("complete-seed").textContent = sessionSeed;
  document.getElementById("complete-trials").textContent = `${trialCount} trials completed`;
  showState("complete");
}

function newSession() {
  showState("setup");
}

// --- WebSocket connection for real-time state push ---
function connectWS() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    console.log("ws message", msg);
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

renderTrackList();
connectWS();
</script>
</body>
</html>
